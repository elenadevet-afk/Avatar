<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --p-color: #6c5ce7; --bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        #editor-panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 750px; }
        .quest-block { border-left: 4px solid var(--p-color); padding: 15px; margin-bottom: 15px; background: #f9f9f9; border-radius: 0 8px 8px 0; }
        label { display: block; font-size: 12px; font-weight: bold; margin-top: 10px; color: #444; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        .controls { display: flex; gap: 10px; margin-top: 25px; }
        .btn { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s; font-size: 14px; }
        .btn-add { background: #00b894; color: white; }
        .btn-gen { background: var(--p-color); color: white; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        
        #final-code-area { width: 100%; height: 120px; margin-top: 20px; display: none; background: #2d3436; color: #fab1a0; padding: 10px; font-family: 'Courier New', monospace; border-radius: 8px; }
    </style>
</head>
<body>

<div id="editor-panel">
    <h2 style="margin-top:0; color:var(--p-color)">🎓 Супер-Конструктор (с аплодисментами)</h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
            <label>Аватар (Обычный) URL:</label>
            <input type="text" id="main-img" value="https://cdn-icons-png.flaticon.com/512/4333/4333609.png">
        </div>
        <div>
            <label>Аватар (Радостный) URL:</label>
            <input type="text" id="happy-img" value="https://cdn-icons-png.flaticon.com/512/4333/4333614.png">
        </div>
    </div>

    <label>Язык озвучки:</label>
    <select id="voice-lang">
        <option value="en-US">English (US)</option>
        <option value="ru-RU" selected>Русский</option>
    </select>

    <div id="questions-list" style="margin-top:20px;">
        <div class="quest-block">
            <strong>Задание №1</strong>
            <input type="text" class="q-text" placeholder="Что говорит аватар?" value="Привет! Как по-английски 'Кот'?">
            <input type="text" class="q-opts" placeholder="Варианты через запятую" value="Dog, Cat, Bird">
            <input type="number" class="q-corr" value="2" title="Номер верного ответа">
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-add" onclick="addQuestion()">➕ Добавить задание</button>
        <button class="btn btn-gen" onclick="generateFinalCode()">📋 Создать код для Genially</button>
    </div>

    <textarea id="final-code-area" readonly></textarea>
</div>

<script>
    let count = 1;
    function addQuestion() {
        if(count >= 10) return;
        count++;
        const div = document.createElement('div');
        div.className = 'quest-block';
        div.innerHTML = `<strong>Задание №${count}</strong>
            <input type="text" class="q-text" placeholder="Фраза аватара">
            <input type="text" class="q-opts" placeholder="Варианты через запятую">
            <input type="number" class="q-corr" value="1">`;
        document.getElementById('questions-list').appendChild(div);
    }

    function generateFinalCode() {
        const lang = document.getElementById('voice-lang').value;
        const imgN = document.getElementById('main-img').value;
        const imgH = document.getElementById('happy-img').value;
        const qTexts = Array.from(document.querySelectorAll('.q-text')).map(i => i.value);
        const qOpts = Array.from(document.querySelectorAll('.q-opts')).map(i => i.value);
        const qCorrs = Array.from(document.querySelectorAll('.q-corr')).map(i => i.value);

        const code = `
<div id="edu-game" style="position:relative; width:800px; height:500px; overflow:hidden; background:transparent;">
    <div id="progress" style="position:absolute; top:10px; left:20px; font-weight:bold; color:#6c5ce7; z-index:5;"></div>
    <img id="char" src="${imgN}" style="position:absolute; bottom:0; left:30px; height:85%; z-index:1; transition:0.3s;">
    <div id="bubble" style="position:absolute; top:40px; left:280px; background:white; border:3px solid #6c5ce7; padding:20px; border-radius:20px; width:320px; box-shadow:0 8px 20px rgba(0,0,0,0.1); z-index:2;">
        <p id="msg" style="margin:0; font-size:18px;"></p>
    </div>
    <div id="btns" style="position:absolute; right:40px; top:50%; transform:translateY(-50%); display:grid; gap:10px; width:280px; z-index:3;"></div>
</div>

<script>
(function(){
    const conf = { t: ${JSON.stringify(qTexts)}, o: ${JSON.stringify(qOpts)}, c: ${JSON.stringify(qCorrs)}, i: ["${imgN}","${imgH}"], l: "${lang}" };
    let cur = 0;
    const char = document.getElementById('char'), msg = document.getElementById('msg'), btns = document.getElementById('btns'), prg = document.getElementById('progress');

    function playApplause() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        for(let i=0; i<200; i++) {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(Math.random()*400 + 200, ctx.currentTime);
            g.gain.setValueAtTime(0.05, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(ctx.currentTime + Math.random()*2); osc.stop(ctx.currentTime + 3);
        }
    }

    function speak(txt) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt); u.lang = conf.l; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    function next() {
        if(cur >= conf.t.length) {
            prg.innerText = ""; char.src = conf.i[1];
            msg.innerHTML = "<b>Блестяще!</b><br>Ты прошел все испытания!";
            btns.innerHTML = ""; speak(msg.innerText); playApplause();
            return;
        }
        prg.innerText = "Вопрос " + (cur+1) + " из " + conf.t.length;
        char.src = conf.i[0]; msg.innerText = conf.t[cur]; btns.innerHTML = "";
        conf.o[cur].split(',').forEach((txt, idx) => {
            const b = document.createElement('button');
            b.innerText = txt.trim();
            b.style = "padding:12px; border-radius:10px; border:2px solid #6c5ce7; background:white; cursor:pointer; font-weight:bold; transition:0.2s;";
            b.onclick = () => {
                if(idx == (conf.c[cur]-1)) {
                    char.src = conf.i[1]; speak("Правильно!");
                    b.style.background = "#55efc4"; cur++; setTimeout(next, 1500);
                } else {
                    speak("Попробуй еще раз"); b.style.background = "#ff7675";
                    setTimeout(() => b.style.background = "white", 600);
                }
            };
            btns.appendChild(b);
        });
        speak(conf.t[cur]);
    }
    setTimeout(next, 500);
})();
<\/script>`.trim();
        
        const area = document.getElementById('final-code-area');
        area.style.display = 'block'; area.value = code; area.select();
        alert("Код готов! Скопируйте его и вставьте в Genially.");
    }
</script>

</body>
</html>

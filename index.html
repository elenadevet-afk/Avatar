<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --p-color: #6c5ce7; --bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #editor { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 750px; }
        .q-item { border-left: 5px solid var(--p-color); padding: 15px; margin-bottom: 10px; background: #f9f9f9; border-radius: 8px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-top: 10px; color: #444; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; width: 100%; }
        .btn-add { background: #00b894; color: white; }
        .btn-gen { background: var(--p-color); color: white; font-size: 16px; }
        .btn-test { background: #fab1a0; color: #2d3436; }
        #res-code { width: 100%; height: 120px; margin-top: 20px; display: none; background: #2d3436; color: #55efc4; padding: 10px; font-family: monospace; border-radius: 8px; font-size: 11px; }
        
        /* Стили предпросмотра */
        #preview-area { 
            width: 100%; 
            height: 200px; 
            border: 2px dashed #ccc; 
            margin-top: 15px; 
            border-radius: 10px; 
            position: relative; 
            overflow: hidden; 
            background: #eee;
            background-image: linear-gradient(45deg, #f5f5f5 25%, transparent 25%), linear-gradient(-45deg, #f5f5f5 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #f5f5f5 75%), linear-gradient(-45deg, transparent 75%, #f5f5f5 75%);
            background-size: 20px 20px;
        }
        #pre-char { position: absolute; bottom: 0; transition: 0.3s; object-fit: contain; }
        .pre-label { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.5); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="editor">
    <h2 style="margin:0 0 15px 0; color: var(--p-color);">🎙️ Конструктор с Предпросмотром</h2>
    
    <label>URL аватара (PNG):</label>
    <input type="text" id="avatar-url" value="https://cdn-icons-png.flaticon.com/512/4844/4844571.png" oninput="updatePre()">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
            <label>Позиция и Размер:</label>
            <select id="v-pos" onchange="updatePre()">
                <option value="left">СЛЕВА</option>
                <option value="right">СПРАВА</option>
            </select>
            <input type="range" id="v-size" min="30" max="100" value="100" style="margin-top:15px;" oninput="updatePre()">
            <div style="text-align: center; font-size: 12px; font-weight: bold;" id="v-size-val">Высота: 100%</div>
        </div>
        <div id="preview-area">
            <span class="pre-label">ПРЕДПРОСМОТР РАЗМЕРА</span>
            <img id="pre-char" src="https://cdn-icons-png.flaticon.com/512/4844/4844571.png" style="height: 100%; left: 0;">
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: end;">
        <div>
            <label>Голос и Язык:</label>
            <select id="v-type" style="margin-bottom: 5px;">
                <option value="male">Мужской (Бас)</option>
                <option value="female" selected>Женский (Звонкий)</option>
                <option value="child">Детский (Высокий)</option>
            </select>
            <select id="v-lang"><option value="ru-RU">Русский</option><option value="en-US">English</option></select>
        </div>
        <button class="btn btn-test" onclick="testV()">Тест голоса 🔊</button>
    </div>

    <div id="q-container" style="margin-top:20px;">
        <div class="q-item">
            <strong>Задание №1</strong>
            <input type="text" class="qt" value="Look at the screen and answer the question.">
            <input type="text" class="qo" value="Yes, No, Maybe">
            <input type="number" class="qc" value="1">
        </div>
    </div>

    <button class="btn btn-add" onclick="addQ()">➕ Добавить задание</button>
    <button class="btn btn-gen" onclick="generate()">Сгенерировать код для Genially</button>
    <textarea id="res-code" readonly></textarea>
</div>

<script>
    function updatePre() {
        const url = document.getElementById('avatar-url').value;
        const size = document.getElementById('v-size').value;
        const pos = document.getElementById('v-pos').value;
        const img = document.getElementById('pre-char');
        
        img.src = url;
        img.style.height = size + '%';
        document.getElementById('v-size-val').innerText = 'Высота: ' + size + '%';
        
        if(pos === 'left') {
            img.style.left = '0'; img.style.right = 'auto';
        } else {
            img.style.right = '0'; img.style.left = 'auto';
        }
    }

    let qCount = 1;
    function addQ() {
        if(qCount >= 10) return;
        qCount++;
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerHTML = `<strong>Задание №${qCount}</strong><input type="text" class="qt" placeholder="Вопрос"><input type="text" class="qo" placeholder="Варианты"><input type="number" class="qc" value="1">`;
        document.getElementById('q-container').appendChild(div);
    }

    function findVoice(lang, type) {
        const vs = window.speechSynthesis.getVoices();
        return vs.find(v => v.lang.includes(lang) && v.name.toLowerCase().includes(type === 'male' ? 'male' : 'female')) || vs.find(v => v.lang.includes(lang)) || vs[0];
    }

    function testV() {
        window.speechSynthesis.cancel();
        const t = document.getElementById('v-type').value, l = document.getElementById('v-lang').value;
        const u = new SpeechSynthesisUtterance("Testing voice settings.");
        u.lang = l; u.voice = findVoice(l, t);
        if(t==='male'){u.pitch=0.1; u.rate=0.85;} else if(t==='child'){u.pitch=2.0; u.rate=1.2;} else {u.pitch=1.4; u.rate=1.0;}
        window.speechSynthesis.speak(u);
    }

    function generate() {
        const conf = {
            url: document.getElementById('avatar-url').value, 
            pos: document.getElementById('v-pos').value,
            size: document.getElementById('v-size').value,
            lang: document.getElementById('v-lang').value, 
            vT: document.getElementById('v-type').value,
            t: Array.from(document.querySelectorAll('.qt')).map(i => i.value),
            o: Array.from(document.querySelectorAll('.qo')).map(i => i.value),
            c: Array.from(document.querySelectorAll('.qc')).map(i => i.value)
        };
        const isL = conf.pos === 'left';
        const code = `
<div id="v-box" style="width:100%; height:100vh; position:relative; background:transparent; font-family:sans-serif; overflow:hidden;">
    <img src="${conf.url}" style="position:absolute; bottom:0; ${isL?'left:0;':'right:0;'} height:${conf.size}%; object-fit:contain; z-index:1;">
    <div onclick="window.repeatPhrase()" style="position:absolute; top:5%; ${isL?'left:33%;':'right:33%;'} background:white; border:4px solid #6c5ce7; padding:15px; border-radius:20px; width:52%; box-shadow:0 10px 20px rgba(0,0,0,0.1); z-index:2; cursor:pointer;">
        <p style="margin:0; font-size:1.2em; font-weight:bold; color:#333;"><span id="v-msg"></span> 🔊</p>
    </div>
    <div id="v-ans" style="position:absolute; ${isL?'left:36%;':'right:36%;'} top:35%; display:grid; gap:10px; width:52%; z-index:3;"></div>
</div>
<script>
(function(){
    const d = {t:${JSON.stringify(conf.t)}, o:${JSON.stringify(conf.o)}, c:${JSON.stringify(conf.c)}, l:"${conf.lang}", vt:"${conf.vT}"};
    let cur = 0;
    window.repeatPhrase = () => speak(d.t[cur]);
    function speak(s) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(s); u.lang = d.l;
        const vs = window.speechSynthesis.getVoices();
        u.voice = vs.find(x => x.lang.includes(d.l) && x.name.toLowerCase().includes(d.vt === 'male' ? 'male' : 'female')) || vs.find(x => x.lang.includes(d.l)) || vs[0];
        if(d.vt==='male'){u.pitch=0.1; u.rate=0.85;} else if(d.vt==='child'){u.pitch=2.0; u.rate=1.2;} else {u.pitch=1.4; u.rate=1.0;}
        window.speechSynthesis.speak(u);
    }
    function load() {
        if(cur >= d.t.length) { document.getElementById('v-msg').innerText = "🏆 Done!"; document.getElementById('v-ans').innerHTML = ""; return; }
        document.getElementById('v-msg').innerText = d.t[cur];
        const area = document.getElementById('v-ans'); area.innerHTML = "";
        d.o[cur].split(',').forEach((txt, i) => {
            const b = document.createElement('button'); b.innerText = txt.trim();
            b.style = "padding:15px; border-radius:12px; border:3px solid #6c5ce7; background:white; cursor:pointer; font-weight:bold; font-size:1.1em; color:#333;";
            b.onclick = () => {
                if(i == (d.c[cur]-1)) { cur++; if(cur < d.t.length) { setTimeout(load, 800); } else { load(); } }
                else { b.style.background = "#ff7675"; setTimeout(()=>b.style.background="white", 600); }
            };
            area.appendChild(b);
        });
        speak(d.t[cur]);
    }
    window.speechSynthesis.onvoiceschanged = load;
    setTimeout(load, 1000);
})();
<\/script>`.trim();
        const res = document.getElementById('res-code'); res.style.display = 'block'; res.value = code; res.select();
    }
    updatePre();
</script>
</body>
</html>

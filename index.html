<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --p-color: #4a90e2; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #editor { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        .q-box { border-left: 5px solid var(--p-color); padding: 15px; margin-bottom: 10px; background: #f9f9f9; border-radius: 8px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-gen { background: var(--p-color); color: white; font-size: 16px; }
        .btn-test { background: #ffeaa7; color: #2d3436; }
        #res-code { width: 100%; height: 120px; margin-top: 20px; display: none; background: #2d3436; color: #55efc4; padding: 10px; font-family: monospace; border-radius: 8px; }
    </style>
</head>
<body>

<div id="editor">
    <h2 style="margin:0 0 15px 0">🎭 Конструктор: Аватар в полный рост</h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div><label>Аватар (Обычный) URL:</label><input type="text" id="img1" value="https://cdn-icons-png.flaticon.com/512/4844/4844571.png"></div>
        <div><label>Аватар (Радостный) URL:</label><input type="text" id="img2" value="https://cdn-icons-png.flaticon.com/512/4844/4844551.png"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
        <select id="lang"><option value="ru-RU">Русский</option><option value="en-US">English</option></select>
        <button class="btn btn-test" onclick="testM()">Послушать Мужской Голос 🔊</button>
    </div>

    <div id="q-list" style="margin-top:20px;">
        <div class="q-box">
            <strong>Задание №1</strong>
            <input type="text" class="qt" value="Здравствуйте! Выберите правильный вариант.">
            <input type="text" class="qo" value="Вариант А, Вариант Б">
            <input type="number" class="qc" value="1">
        </div>
    </div>

    <button class="btn btn-gen" onclick="gen()">Сгенерировать прозрачный виджет для Genially</button>
    <textarea id="res-code" readonly></textarea>
</div>

<script>
    function testM() {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance("Привет! Теперь я звучу как мужчина?");
        u.lang = document.getElementById('lang').value;
        const vs = window.speechSynthesis.getVoices();
        // Жесткий поиск мужского голоса
        u.voice = vs.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('pavel') || v.name.toLowerCase().includes('dmitry')) || vs[0];
        u.pitch = 0.4; // Максимально низкий бас
        u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    function gen() {
        const conf = {
            l: document.getElementById('lang').value,
            i1: document.getElementById('img1').value,
            i2: document.getElementById('img2').value,
            qt: Array.from(document.querySelectorAll('.qt')).map(i => i.value),
            qo: Array.from(document.querySelectorAll('.qo')).map(i => i.value),
            qc: Array.from(document.querySelectorAll('.qc')).map(i => i.value)
        };

        const code = `
<div id="full-body-widget" style="width:100%; height:100vh; position:relative; overflow:hidden; background:transparent;">
    <img id="v-char" src="${conf.i1}" style="position:absolute; bottom:0; left:0; height:100%; object-fit:contain; z-index:1; pointer-events:none;">
    <div id="v-bubble" style="position:absolute; top:5%; left:30%; background:white; border:4px solid #4a90e2; padding:15px; border-radius:20px; width:55%; box-shadow:0 10px 25px rgba(0,0,0,0.2); z-index:2; font-family:sans-serif;">
        <p id="v-txt" style="margin:0; font-size:1.2em; font-weight:bold;"></p>
        <div id="v-prg" style="font-size:0.7em; color:#999; margin-top:5px;"></div>
    </div>
    <div id="v-ans" style="position:absolute; left:35%; top:35%; display:grid; gap:10px; width:55%; z-index:3;"></div>
</div>

<script>
(function(){
    const c = { t:${JSON.stringify(conf.qt)}, o:${JSON.stringify(conf.qo)}, c:${JSON.stringify(conf.qc)}, imgs:["${conf.i1}","${conf.i2}"], l:"${conf.l}" };
    let cur = 0;
    const av=document.getElementById('v-char'), txt=document.getElementById('v-txt'), ans=document.getElementById('v-ans'), prg=document.getElementById('v-prg');

    function speak(s) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(s); u.lang = c.l;
        const vs = window.speechSynthesis.getVoices();
        u.voice = vs.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('pavel') || v.name.toLowerCase().includes('dmitry')) || vs[0];
        u.pitch = 0.4; u.rate = 0.8;
        window.speechSynthesis.speak(u);
    }

    function play() {
        if(cur >= c.t.length) {
            av.src = c.imgs[1]; txt.innerHTML = "🎉 Задания выполнены!"; ans.innerHTML = ""; prg.innerText=""; speak("Задания выполнены!"); return;
        }
        av.src = c.imgs[0]; txt.innerText = c.t[cur]; prg.innerText = "Вопрос " + (cur+1) + " / " + c.t.length;
        ans.innerHTML = "";
        c.o[cur].split(',').forEach((t, i) => {
            const b = document.createElement('button');
            b.innerText = t.trim();
            b.style = "padding:15px; border-radius:12px; border:3px solid #4a90e2; background:rgba(255,255,255,0.9); cursor:pointer; font-weight:bold; font-size:1.1em; transition:0.2s;";
            b.onclick = () => {
                if(i == (c.c[cur]-1)) {
                    av.src = c.imgs[1]; speak("Верно!"); cur++; setTimeout(play, 1500);
                } else {
                    speak("Нет"); b.style.background = "#ff7675"; setTimeout(()=>b.style.background="white", 600);
                }
            };
            ans.appendChild(b);
        });
        speak(c.t[cur]);
    }
    window.speechSynthesis.onvoiceschanged = play;
    setTimeout(play, 1000);
})();
<\/script>`.trim();

        document.getElementById('res-code').style.display = 'block';
        document.getElementById('res-code').value = code;
        document.getElementById('res-code').select();
    }
</script>

</body>
</html>

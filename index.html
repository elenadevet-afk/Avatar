<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --p-color: #6c5ce7; --bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #editor { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .q-item { border-left: 5px solid var(--p-color); padding: 15px; margin-bottom: 10px; background: #f9f9f9; border-radius: 8px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-top: 10px; color: #444; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; width: 100%; }
        .btn-add { background: #00b894; color: white; }
        .btn-gen { background: var(--p-color); color: white; font-size: 16px; }
        .preview-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 12px; }
        #preview-window { width: 100%; height: 200px; border: 2px solid #ddd; border-radius: 10px; position: relative; overflow: hidden; background-color: #eee; }
        #pre-char-img { position: absolute; bottom: 0; transition: 0.2s linear; object-fit: contain; }
        .color-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; padding: 10px; background: #f0f0ff; border-radius: 10px; }
        #res-code { width: 100%; height: 100px; margin-top: 20px; display: none; background: #2d3436; color: #55efc4; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>

<div id="editor">
    <h2 style="margin:0 0 15px 0; color: var(--p-color);">🎊 Игровой конструктор (No-Reload Fix)</h2>
    
    <label>URL аватара (PNG):</label>
    <input type="text" id="avatar-url" value="https://cdn-icons-png.flaticon.com/512/4844/4844571.png" oninput="updatePre()">

    <div class="preview-container">
        <div>
            <label>Позиция и Высота:</label>
            <select id="v-pos" onchange="updatePre()">
                <option value="left">СЛЕВА</option>
                <option value="right">СПРАВА</option>
            </select>
            <input type="range" id="v-size" min="20" max="100" value="100" oninput="updatePre()">
        </div>
        <div id="preview-window">
            <img id="pre-char-img" src="" style="height: 100%;">
        </div>
    </div>

    <div class="color-settings">
        <div><label>Верно:</label><input type="color" id="color-right" value="#00b894"></div>
        <div><label>Ошибка:</label><input type="color" id="color-wrong" value="#ff7675"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: end; margin-top: 15px;">
        <div>
            <label>Голос заданий:</label>
            <select id="v-type">
                <option value="male">Мужской</option>
                <option value="female" selected>Женский</option>
                <option value="child">Детский</option>
            </select>
            <select id="v-lang" style="margin-top:5px;"><option value="ru-RU">Русский</option><option value="en-US">English</option></select>
        </div>
        <button class="btn" style="background:#fab1a0;" onclick="testV()">Тест голоса 🔊</button>
    </div>

    <div id="q-container" style="margin-top:20px;">
        <div class="q-item">
            <strong>Задание №1</strong>
            <input type="text" class="qt" value="Great job! Listen and click.">
            <input type="text" class="qo" value="Yes, No, Maybe">
            <input type="number" class="qc" value="1">
        </div>
    </div>

    <button class="btn btn-add" onclick="addQ()">➕ Добавить задание</button>
    <button class="btn btn-gen" onclick="generate()">Сгенерировать игру</button>
    <textarea id="res-code" readonly></textarea>
</div>

<script>
    function updatePre() {
        const url = document.getElementById('avatar-url').value;
        const size = document.getElementById('v-size').value;
        const pos = document.getElementById('v-pos').value;
        const img = document.getElementById('pre-char-img');
        img.src = url; img.style.height = size + '%';
        if(pos === 'left') { img.style.left = '10px'; img.style.right = 'auto'; } 
        else { img.style.right = '10px'; img.style.left = 'auto'; }
    }

    function addQ() {
        const count = document.querySelectorAll('.q-item').length + 1;
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerHTML = `<strong>Задание №${count}</strong><input type="text" class="qt" placeholder="Вопрос"><input type="text" class="qo" placeholder="Варианты"><input type="number" class="qc" value="1">`;
        document.getElementById('q-container').appendChild(div);
    }

    function findVoice(lang, type) {
        const vs = window.speechSynthesis.getVoices();
        return vs.find(v => v.lang.includes(lang) && v.name.toLowerCase().includes(type==='male'?'male':'female')) || vs.find(v => v.lang.includes(lang)) || vs[0];
    }

    function testV() {
        window.speechSynthesis.cancel();
        const t = document.getElementById('v-type').value, l = document.getElementById('v-lang').value;
        const u = new SpeechSynthesisUtterance("Test"); u.lang = l; u.voice = findVoice(l, t);
        if(t==='male'){u.pitch=0.1; u.rate=0.85;} else if(t==='child'){u.pitch=2.0; u.rate=1.2;} else {u.pitch=1.4; u.rate=1.0;}
        window.speechSynthesis.speak(u);
    }

    function generate() {
        const conf = {
            url: document.getElementById('avatar-url').value, pos: document.getElementById('v-pos').value,
            size: document.getElementById('v-size').value, lang: document.getElementById('v-lang').value, 
            vT: document.getElementById('v-type').value, cR: document.getElementById('color-right').value,
            cW: document.getElementById('color-wrong').value,
            t: Array.from(document.querySelectorAll('.qt')).map(i => i.value),
            o: Array.from(document.querySelectorAll('.qo')).map(i => i.value),
            c: Array.from(document.querySelectorAll('.qc')).map(i => i.value)
        };
        const isL = conf.pos === 'left';
        const code = `
<div id="v-game" style="width:100%; height:100%; min-height:450px; position:relative; background:transparent; font-family:sans-serif; overflow:hidden;">
    <div id="v-score-ui" style="position:absolute; top:20px; ${isL?'right:20px;':'left:20px;'} background:white; padding:10px 20px; border-radius:50px; border:3px solid #6c5ce7; font-weight:bold; color:#6c5ce7; z-index:20; box-shadow:0 4px 10px rgba(0,0,0,0.1);">Score: <span id="v-score-val">0</span></div>
    
    <img id="v-avatar" src="${conf.url}" style="position:absolute; bottom:0; ${isL?'left:0;':'right:0;'} height:${conf.size}%; object-fit:contain; z-index:1; pointer-events:none; transition: 0.5s;">
    
    <div id="v-wrap" style="position:absolute; top:15%; ${isL?'left:35%;':'right:35%;'} width:60%; display:flex; flex-direction:column; gap:15px; z-index:10;">
        <div id="v-bubble" style="background:white; border:4px solid #6c5ce7; padding:15px; border-radius:20px; box-shadow:0 8px 15px rgba(0,0,0,0.1); cursor:pointer;">
            <p style="margin:0; font-size:1.2em; font-weight:bold; color:#333;"><span id="v-txt"></span> 🔊</p>
        </div>
        <div id="v-btns" style="display:grid; gap:10px;"></div>
    </div>
    <canvas id="v-confetti" style="position:absolute; top:0; left:0; pointer-events:none; z-index:15; display:none;"></canvas>
</div>
<script>
(function(){
    const cfg = {t:${JSON.stringify(conf.t)}, o:${JSON.stringify(conf.o)}, c:${JSON.stringify(conf.c)}, l:"${conf.lang}", vt:"${conf.vT}", ok:"${conf.cR}", no:"${conf.cW}"};
    let cur = 0, score = 0, canS = true, confettiActive = false;
    const ding = new Audio('https://www.myinstants.com/media/sounds/ding-sound-effect_1.mp3');
    const fanf = new Audio('https://www.myinstants.com/media/sounds/tada-sound-effect.mp3');

    const bubble = document.getElementById('v-bubble');
    const area = document.getElementById('v-btns');
    const scoreVal = document.getElementById('v-score-val');
    const canvas = document.getElementById('v-confetti');

    bubble.onclick = () => { if(cur < cfg.t.length) speak(cfg.t[cur]); };

    function resetInternal() {
        cur = 0; score = 0; canS = true; confettiActive = false;
        scoreVal.innerText = "0";
        canvas.style.display = 'none';
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width,canvas.height);
        load();
    }

    function speak(s) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(s); u.lang = cfg.l;
        const vs = window.speechSynthesis.getVoices();
        u.voice = vs.find(x => x.lang.includes(cfg.l) && x.name.toLowerCase().includes(cfg.vt==='male'?'male':'female')) || vs.find(x => x.lang.includes(cfg.l)) || vs[0];
        if(cfg.vt==='male'){u.pitch=0.1; u.rate=0.85;} else if(cfg.vt==='child'){u.pitch=2.0; u.rate=1.2;} else {u.pitch=1.4; u.rate=1.0;}
        window.speechSynthesis.speak(u);
    }

    function fire() {
        canvas.style.display = 'block';
        confettiActive = true;
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for(let i=0; i<100; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height, r:Math.random()*6+2, d:Math.random()*10, color:"#"+((1<<24)*Math.random()|0).toString(16)});
        function draw() {
            if(!confettiActive) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                ctx.beginPath(); ctx.fillStyle = p.color; ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                p.y += p.d; if(p.y > canvas.height) p.y = -10;
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    function load() {
        if(cur >= cfg.t.length) { 
            fanf.play(); fire();
            window.speechSynthesis.cancel(); 
            document.getElementById('v-txt').innerText = "Game Over! Score: " + score + "/" + cfg.t.length;
            area.innerHTML = "";
            const rb = document.createElement('button');
            rb.innerText = "🔄 Play Again";
            rb.style = "padding:15px; border-radius:12px; border:none; background:#6c5ce7; color:white; cursor:pointer; font-weight:bold; font-size:1.1em; box-shadow:0 4px 10px rgba(0,0,0,0.2);";
            rb.onclick = resetInternal;
            area.appendChild(rb);
            return; 
        }
        canS = true; document.getElementById('v-txt').innerText = cfg.t[cur];
        area.innerHTML = "";
        cfg.o[cur].split(',').forEach((txt, i) => {
            const b = document.createElement('button'); b.innerText = txt.trim();
            b.style = "padding:12px; border-radius:12px; border:3px solid #6c5ce7; background:white; cursor:pointer; font-weight:bold; font-size:1.1em; color:#333;";
            b.onclick = () => {
                if(i == (cfg.c[cur]-1)) { 
                    ding.play(); b.style.background = cfg.ok; b.style.color = "white";
                    if(canS) { score++; scoreVal.innerText = score; }
                    cur++; setTimeout(load, 600);
                } else { 
                    canS = false; b.style.background = cfg.no; b.style.color = "white";
                    setTimeout(() => { b.style.background="white"; b.style.color="#333"; }, 600);
                }
            };
            area.appendChild(b);
        });
        speak(cfg.t[cur]);
    }
    window.speechSynthesis.onvoiceschanged = load; setTimeout(load, 800);
})();
<\/script>`.trim();
        const res = document.getElementById('res-code'); res.style.display = 'block'; res.value = code; res.select();
    }
    window.onload = updatePre;
</script>
</body>
</html>

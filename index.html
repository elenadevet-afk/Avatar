<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --p-color: #6c5ce7; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #editor-panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 750px; }
        .quest-block { border-left: 4px solid var(--p-color); padding: 15px; margin-bottom: 15px; background: #f9f9f9; border-radius: 8px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-top: 10px; color: #444; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s; margin-top: 10px; }
        .btn-add { background: #00b894; color: white; }
        .btn-gen { background: var(--p-color); color: white; }
        .btn-test { background: #fab1a0; color: #2d3436; }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        #final-code-area { width: 100%; height: 120px; margin-top: 20px; display: none; background: #2d3436; color: #55efc4; padding: 10px; font-family: monospace; border-radius: 8px; }
    </style>
</head>
<body>

<div id="editor-panel">
    <h2 style="margin-top:0; color:var(--p-color)">🎙️ Конструктор с тестом голоса</h2>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div><label>Аватар (Обычный) URL:</label><input type="text" id="main-img" value="https://cdn-icons-png.flaticon.com/512/4333/4333609.png"></div>
        <div><label>Аватар (Радостный) URL:</label><input type="text" id="happy-img" value="https://cdn-icons-png.flaticon.com/512/4333/4333614.png"></div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: end;">
        <div>
            <label>Язык:</label>
            <select id="voice-lang">
                <option value="en-US">English (US)</option>
                <option value="ru-RU" selected>Русский</option>
            </select>
        </div>
        <div>
            <label>Голос:</label>
            <select id="voice-type">
                <option value="female">Женский</option>
                <option value="male">Мужской</option>
                <option value="child">Детский</option>
            </select>
        </div>
        <button class="btn btn-test" onclick="testVoice()">Проверить голос 🔊</button>
    </div>

    <div id="questions-list" style="margin-top:20px;">
        <div class="quest-block">
            <strong>Задание №1</strong>
            <input type="text" class="q-text" placeholder="Фраза аватара" value="Привет! Готов начать урок?">
            <input type="text" class="q-opts" placeholder="Варианты через запятую" value="Да, Нет, Не знаю">
            <input type="number" class="q-corr" value="1">
        </div>
    </div>

    <div style="display:flex; gap:10px">
        <button class="btn btn-add" onclick="addQuestion()">➕ Добавить задание</button>
        <button class="btn btn-gen" onclick="generateFinalCode()">📋 Код для Genially</button>
    </div>
    <textarea id="final-code-area" readonly></textarea>
</div>

<script>
    let count = 1;

    function addQuestion() {
        if(count >= 10) return;
        count++;
        const div = document.createElement('div');
        div.className = 'quest-block';
        div.innerHTML = `<strong>Задание №${count}</strong>
            <input type="text" class="q-text" placeholder="Фраза аватара">
            <input type="text" class="q-opts" placeholder="Варианты через запятую">
            <input type="number" class="q-corr" value="1">`;
        document.getElementById('questions-list').appendChild(div);
    }

    function getUtterance(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const lang = document.getElementById('voice-lang').value;
        const type = document.getElementById('voice-type').value;
        u.lang = lang;

        const voices = window.speechSynthesis.getVoices();
        let voice = voices.find(v => v.lang === lang && v.name.toLowerCase().includes(type === 'child' ? 'female' : type));
        if(!voice) voice = voices.find(v => v.lang === lang);
        if(voice) u.voice = voice;

        if(type === 'child') { u.pitch = 1.7; u.rate = 1.1; }
        else if(type === 'male') { u.pitch = 0.8; u.rate = 0.95; }
        else { u.pitch = 1.0; u.rate = 1.0; }
        
        return u;
    }

    function testVoice() {
        const lang = document.getElementById('voice-lang').value;
        const msg = lang === 'ru-RU' ? "Привет! Как тебе мой голос?" : "Hello! How do you like my voice?";
        window.speechSynthesis.speak(getUtterance(msg));
    }

    function generateFinalCode() {
        const lang = document.getElementById('voice-lang').value;
        const vType = document.getElementById('voice-type').value;
        const imgN = document.getElementById('main-img').value;
        const imgH = document.getElementById('happy-img').value;
        const qTexts = Array.from(document.querySelectorAll('.q-text')).map(i => i.value);
        const qOpts = Array.from(document.querySelectorAll('.q-opts')).map(i => i.value);
        const qCorrs = Array.from(document.querySelectorAll('.q-corr')).map(i => i.value);

        const code = `
<div id="game-container" style="position:relative; width:800px; height:500px; overflow:hidden;">
    <div id="status" style="position:absolute; top:10px; left:20px; font-weight:bold; color:#6c5ce7; font-family:sans-serif;"></div>
    <img id="avatar" src="${imgN}" style="position:absolute; bottom:0; left:20px; height:90%; transition:0.3s; z-index:1;">
    <div style="position:absolute; top:40px; left:300px; background:white; border:3px solid #6c5ce7; padding:15px; border-radius:20px; width:300px; box-shadow:0 5px 15px rgba(0,0,0,0.1); z-index:2; font-family:sans-serif;">
        <p id="speech-txt" style="margin:0; font-size:18px;"></p>
    </div>
    <div id="ans-zone" style="position:absolute; right:40px; top:180px; display:grid; gap:10px; width:280px; z-index:3;"></div>
</div>
<script>
(function(){
    const cfg = { t: ${JSON.stringify(qTexts)}, o: ${JSON.stringify(qOpts)}, c: ${JSON.stringify(qCorrs)}, i: ["${imgN}","${imgH}"], l: "${lang}", v: "${vType}" };
    let idx = 0;
    const av = document.getElementById('avatar'), st = document.getElementById('speech-txt'), zone = document.getElementById('ans-zone'), pr = document.getElementById('status');

    function speak(txt) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt); u.lang = cfg.l;
        const vs = window.speechSynthesis.getVoices();
        let v = vs.find(x => x.lang === cfg.l && x.name.toLowerCase().includes(cfg.v === 'child' ? 'female' : cfg.v));
        if(!v) v = vs.find(x => x.lang === cfg.l);
        if(v) u.voice = v;
        if(cfg.v === 'child') { u.pitch = 1.7; u.rate = 1.1; } else if(cfg.v === 'male') { u.pitch = 0.8; u.rate = 0.95; }
        window.speechSynthesis.speak(u);
    }

    function load() {
        if(idx >= cfg.t.length) {
            pr.innerText = ""; av.src = cfg.i[1]; st.innerHTML = "🏁 <b>Задания выполнены!</b>"; zone.innerHTML = ""; speak(st.innerText);
            return;
        }
        pr.innerText = "Вопрос " + (idx+1) + " из " + cfg.t.length;
        av.src = cfg.i[0]; st.innerText = cfg.t[idx]; zone.innerHTML = "";
        cfg.o[idx].split(',').forEach((ans, i) => {
            const b = document.createElement('button');
            b.innerText = ans.trim();
            b.style = "padding:12px; border-radius:10px; border:2px solid #6c5ce7; background:white; cursor:pointer; font-weight:bold; font-family:sans-serif;";
            b.onclick = () => {
                if(i == (cfg.c[idx]-1)) {
                    av.src = cfg.i[1]; speak("Верно!"); idx++; setTimeout(load, 1500);
                } else {
                    speak("Попробуй еще раз"); b.style.background = "#ff7675"; setTimeout(() => b.style.background = "white", 600);
                }
            };
            zone.appendChild(b);
        });
        speak(cfg.t[idx]);
    }
    window.speechSynthesis.onvoiceschanged = load;
    setTimeout(load, 600);
})();
<\/script>`.trim();
        
        const area = document.getElementById('final-code-area');
        area.style.display = 'block'; area.value = code; area.select();
    }
</script>

</body>
</html>
